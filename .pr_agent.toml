[pr_agent]
# PR Agentの設定
# PR作成時・更新時に自動レビューを行うか
auto_review = true

# AIへの追加の指示
[pr_reviewer]
extra_instructions = """
変更がプロジェクト全体に与える影響や、アーキテクチャの観点など、広いスコープからコードレビューを行ってください。必ず日本語でコメントしてください。
メインブランチにマージされた場合に Cloud Run / Cloudflare Pages 上の本番環境にデプロイされることを考慮し、以下の観点を強調し、重要視して必ずレビューに盛り込んでください:
- 実行環境へのアクセス方法（認証情報、API キー、DB 接続文字列、内部 URL など）がコードやログから漏洩していないこと。
- 実行環境に不正にアクセスするための攻撃手法や脆弱性（インジェクション、認可不足、不適切な権限設定、CORS / CSRF / Secure Cookie / Secure Headers の設定崩れなど）が入り込んでいないこと。

Vue 3 構成のフロントエンドコードとしてレビューしてください:
- コンポーネントの設計や Props/Events の定義が適切か。
- ユーザー入力のバリデーションや XSS 対策（innerHTML / v-html の直接使用など）に不備が無いか。
- Vuex ストアのデータ管理や非同期処理が適切か。

GitHub Actions ワークフローとしてレビューしてください:
- シークレットの露出 (echo / set-output 経由のリーク) が無いか。
- 外部 action は SHA pin されているか。
- permissions: が最小権限になっているか。
"""

[pr_description]
# PRの説明文を自動生成するか
auto_description = true
extra_instructions = "必ず日本語で記載してください。"

[config]
# 日本語設定
custom_model_max_tokens = 8192
language = "ja"

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (Secret Detection)
        description: Detect hardcoded secrets using Gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=5000']
        name: check added large files
        description: 巨大ファイル（DBダンプや非圧縮メディア等）の意図しないコミットを防止
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
        name: no commit to branch
        description: main/masterブランチへの直接コミットを禁止し、CI/CDやレビューのバイパスを防止
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
        name: detect aws credentials
        description: Detects hardcoded AWS credentials
      - id: detect-private-key
        name: detect private key
        description: Detects the presence of private keys
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: local
    hooks:
      - id: forbid-sensitive-files
        name: forbid sensitive files
        entry: 'シークレットやAI作業ディレクトリ等の機密ファイルはコミット禁止です'
        language: fail
        # .gitignore や .gitattributes と連動して意図しない漏洩を防止
        files: '(?i)(/\.claude/|/\.cursor/|/\.aider.*/|/\.continue/|/\.windsurf/|/\.cline/|.*-report\.md$|\.pem$|\.key$|/\.env.*|\.tfstate.*|/\.yarnrc$|\.db$|\.dump$|\.bak$|\.sqlite.*$|^\.claude/|^\.cursor/|^\.aider.*/|^\.continue/|^\.windsurf/|^\.cline/|^\.env.*|^\.yarnrc$)'
        exclude: '(?i)(/\.env\.example$|^\.env\.example$|/\.aider\.conf\.yml$|^\.aider\.conf\.yml$|/\.aider\.instruction\.md$|^\.aider\.instruction\.md$|/\.cursor/rules/.*|^\.cursor/rules/.*)'

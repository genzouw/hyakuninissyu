repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (Secret Detection)
        description: Detect hardcoded secrets using Gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: '^patches/'
      - id: trailing-whitespace
        exclude: '^patches/'
      - id: check-merge-conflict
        name: check merge conflict
        description: コンフリクトマーカーのコミットを防止
      - id: check-added-large-files
        args: ['--maxkb=5000']
        name: check added large files
        description: 巨大ファイル（DBダンプや非圧縮メディア等）の意図しないコミットを防止
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
        name: no commit to branch
        description: main/masterブランチへの直接コミットを禁止し、CI/CDやレビューのバイパスを防止
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
        name: detect aws credentials
        description: Detects hardcoded AWS credentials
      - id: detect-private-key
        name: detect private key
        description: Detects the presence of private keys
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.11
    hooks:
      - id: trufflehog
  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
        name: typos (Spell Checker)
        description: Detect spelling mistakes using typos
  - repo: local
    hooks:
      - id: forbid-sensitive-files
        name: forbid sensitive files and AI agent traces
        entry: 意図しない機密ファイルまたはAIエージェントの作業履歴がステージングされています。
        language: fail
        files: '(?i)((^|/)(\.env[^/]*|\.npmrc|\.yarnrc[^/]*|\.?bunfig\.toml$|\.claude/|\.cursor/|\.aider|\.continue/|\.windsurf/|\.cline/|\.roo/|\.aws/|\.kube/|\.gcp/|\.azure/|\.vercel/|\.netlify/)|(^|/)[^/]*credentials[^/]*\.json|(^|/)[^/]*service-account[^/]*\.json|(^|/)http-client\.env\.json$|(^|/)postman_environment\.json$|(^|/)insomnia_.*\.json$|(^|/)id_rsa[^/]*|(^|/)id_ed25519[^/]*|(^|/)(claude|cursor|aider|continue|windsurf|cline|copilot|gemini)-report\.md|\.(tfstate|tfvars|db|dump|bak|pem|key|cert|crt|p12|pfx|log)$|\.sqlite)'
        exclude: '(?i)(^|/)(\.env\.example$|\.aider\.conf\.yml$|\.aider\.instruction\.md$|\.cursor/rules/.*)'
        description: 'AIエージェントの作業ディレクトリ、汎用的なシークレットファイル（APIクライアント環境設定を含む）、パッケージマネージャー設定、データベースのダンプファイルのコミットをブロックします'

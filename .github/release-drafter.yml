name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
  - title: '🛠 Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'test'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bug'
      - 'dependencies'
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'test'
  default: patch
template: |
  ## What's Changed

  $CHANGES

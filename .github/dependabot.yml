# Dependabot configuration for automatic dependency updates
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Node.js dependencies (root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    pull-request-branch-name:
      separator: /
    # The Jest stack must be upgraded as a single unit: jest, babel-jest,
    # vue-jest, jest-serializer-vue and jest-environment-* are tightly
    # coupled (transformer ABI, getCacheKey signature, etc.). Allowing
    # Dependabot to bump them individually is the same failure mode that
    # left main with babel-jest@30 + babel-core@6 silently broken before
    # PR #127. CI does not run `npm run unit`, so an individual bump
    # would not be detected. Group them so updates only land together.
    groups:
      jest-stack:
        patterns:
          - 'jest'
          - 'jest-*'
          - 'babel-jest'
          - '@vue/vue3-jest'
          - '@types/jest'
    # Block major bumps while upstream packages cannot follow:
    #   - Jest stack: @vue/vue3-jest@29.2.6 pins peer deps to jest 29.x /
    #     babel-jest 29.x and is npm latest. See Issue #133.
    #   - eslint / neostandard: neostandard@0.13.0 pins peer dep to
    #     eslint ^9 and bundles @stylistic/eslint-plugin@2.11.0 which
    #     crashes on eslint 10 (removed `sourceCode.isSpaceBetweenTokens`).
    #     See closed PR #196.
    # When upstream ships compatible releases, drop the corresponding
    # entries below and let Dependabot resume major bumps.
    ignore:
      - dependency-name: 'jest'
        update-types: ['version-update:semver-major']
      - dependency-name: 'jest-*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'babel-jest'
        update-types: ['version-update:semver-major']
      - dependency-name: '@vue/vue3-jest'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/jest'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'neostandard'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    pull-request-branch-name:
      separator: /

  # Docker dependencies
  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
    pull-request-branch-name:
      separator: /

  # Python / pip dependencies (for pre-commit hooks etc.)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - pip
    commit-message:
      prefix: chore
      include: scope
    pull-request-branch-name:
      separator: /

# Dependabot configuration for automatic dependency updates
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Node.js dependencies (root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    pull-request-branch-name:
      separator: /
    # The Jest stack must be upgraded as a single unit: jest, babel-jest,
    # vue-jest, jest-serializer-vue and jest-environment-* are tightly
    # coupled (transformer ABI, getCacheKey signature, etc.). Allowing
    # Dependabot to bump them individually is the same failure mode that
    # left main with babel-jest@30 + babel-core@6 silently broken before
    # PR #127. CI does not run `npm run unit`, so an individual bump
    # would not be detected. Group them so updates only land together.
    groups:
      jest-stack:
        patterns:
          - "jest"
          - "jest-*"
          - "babel-jest"
          - "@vue/vue3-jest"
          - "@types/jest"
    ignore:
      # bootstrap@5 drops jQuery, swaps popper.js@1 for @popperjs/core@2, and
      # renames/removes utility classes the templates currently rely on
      # (pl-* → ps-*, pr-* → pe-*, mr-* → me-*, ml-* → ms-*, form-group
      # removed). The Bootswatch theme at src/assets/yeti/bootstrap.min.css
      # is BS4 too. Migration to BS5 (+ bootstrap-vue-next is already
      # bumped to a BS5-compatible release line) requires a separate UI
      # sweep. Block major bumps until that effort is scheduled.
      - dependency-name: bootstrap
        versions:
          - ">= 5.0.0"
      # chromedriver majors must match the Chrome browser major (e.g.
      # chromedriver@148 requires Chrome 148). CI uses `npm ci --ignore-scripts`
      # so an incompatible chromedriver major would silently pass CI but break
      # `npm run e2e` locally. Pin majors and bump manually when the Chrome
      # major used locally is aligned.
      - dependency-name: chromedriver
        update-types:
          - version-update:semver-major

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    pull-request-branch-name:
      separator: /

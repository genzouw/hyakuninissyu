name: SBOM Generation

on:
  push:
    branches: [main]
  schedule:
    # 毎週月曜 06:00 JST (= 日曜 21:00 UTC) に定期実行
    - cron: '15 21 * * 0'
  workflow_dispatch:

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # 依存関係グラフへの書き込み (ghcr.io へのアップロードではなく repository 内の依存関係として登録するため)

jobs:
  generate-sbom:
    name: Generate SBOM and upload to Dependency Graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@f3242a00067683935266850fa9767228a07c458e # v0.17.9
        with:
          path: ./
          format: spdx-json
          output-file: 'sbom.spdx.json'
          dependency-snapshot: true

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

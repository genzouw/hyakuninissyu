name: Qodo Merge (formerly PR-Agent)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]

# 最小権限とし、ジョブ側で必要な書込権限のみ追加する
permissions:
  contents: read

# 同一 PR への更新やコメント連投で重複起動するのを抑止し、ノイズとコストを削減
concurrency:
  group: qodo-merge-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  qodo_merge:
    name: Auto PR Review
    runs-on: ubuntu-latest
    # 1) Bot 以外のイベントに限定
    # 2) issue_comment は PR に紐づくコメントのみ対象（純粋な Issue では起動しない）
    # 3) リポジトリの信頼済みアクター（OWNER / MEMBER / COLLABORATOR）のみに限定
    if: >
      github.event.sender.type != 'Bot' &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request != null) &&
      (github.event.sender.association == 'OWNER' ||
       github.event.sender.association == 'MEMBER' ||
       github.event.sender.association == 'COLLABORATOR')
    # PR コメント投稿に必要な権限のみ付与
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4
        with:
          # Qodo Merge の後続ステップに git 操作は不要のため、認証情報を残さない
          persist-credentials: false

      - name: Qodo Merge (PR-Agent) アクションの実行
        # Qodo Merge (旧 CodiumAI PR-Agent) の最新バージョンを使用
        # PRのコメントにて `/review`, `/describe`, `/improve`, `/ask` などのコマンドを実行できます。
        uses: qodo-ai/qodo-merge@v0.40.1 # 最新バージョンに近いものを指定
        env:
          # Qodo Merge (PR-Agent) は公開リポジトリ（オープンソース）では無料で利用可能です。
          # GitHub トークンを使用して PR にコメントを追加します。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

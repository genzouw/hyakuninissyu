name: reviewdog-stylelint (自動コードレビュー)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  stylelint:
    name: Stylelint による自動コードレビュー
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # reviewdog が PR にコメントするために必要
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Bun Environment
        uses: ./.github/actions/setup-bun-env

      - name: Setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.20.2

      - name: Run Stylelint with Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -o pipefail
          bun x stylelint "src/**/*.vue" \
            | reviewdog -f=stylelint -name="stylelint" -reporter=github-pr-review -fail-on-error

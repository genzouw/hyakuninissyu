name: Repomix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行

permissions:
  contents: read

concurrency:
  group: repomix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-repo:
    name: Pack repository with Repomix
    runs-on: ubuntu-latest
    permissions:
      contents: write # ai-context ブランチへのプッシュに必要
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build and generate llms-full.txt
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: bun run build

      - name: Pack repository with Repomix
        uses: yamadashy/repomix/.github/actions/repomix@a7b93adfcdb11be923a9a092cceb1cb6739ef8e1 # v1.14.1
        with:
          output: repomix-output.xml
          style: xml

      - name: Upload Repomix output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repomix-output
          path: repomix-output.xml

      - name: Prepare ai-context directory
        run: |
          mkdir -p public-context
          cp repomix-output.xml public-context/
          # AIクローラーや検索エンジン(GEO)向けによりリッチなコンテキストを公開
          if [ -f "dist/llms-full.txt" ]; then
            cp dist/llms-full.txt public-context/
          fi
          # static/llms.txt も合わせて配置
          if [ -f "static/llms.txt" ]; then
            cp static/llms.txt public-context/
          fi

      - name: Deploy to ai-context branch
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475c00e11fe70ba3 # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-context
          publish_branch: ai-context
          force_orphan: true
          commit_message: 'chore: update repomix and AI context output [skip ci]'

name: Repomix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行

permissions:
  contents: read

concurrency:
  group: repomix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-repo:
    name: Pack repository with Repomix
    runs-on: ubuntu-latest
    permissions:
      contents: write # ai-context ブランチへのプッシュに必要
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun Environment
        uses: ./.github/actions/setup-bun-env

      - name: Build and generate llms-full.txt
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: bun run build

      # yamadashy/repomix の Action はリポジトリの Actions allow list 外のため、
      # devDependency としてインストール済みの repomix CLI を直接実行する。
      - name: Pack repository with Repomix
        run: bun run repomix --output repomix-output.xml --style xml

      - name: Upload Repomix output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repomix-output
          path: repomix-output.xml

      - name: Prepare ai-context directory
        run: |
          mkdir -p public-context
          cp repomix-output.xml public-context/
          # AIクローラーや検索エンジン(GEO)向けによりリッチなコンテキストを公開
          if [ -f "dist/llms-full.txt" ]; then
            cp dist/llms-full.txt public-context/
          fi
          # static/llms.txt も合わせて配置
          if [ -f "static/llms.txt" ]; then
            cp static/llms.txt public-context/
          fi

      # peaceiris/actions-gh-pages はリポジトリの Actions allow list 外のため、
      # git による orphan ブランチへの強制 push に置換している (force_orphan 相当)。
      - name: Deploy to ai-context branch
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd public-context
          git init -q
          git checkout -q --orphan ai-context
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy; skipping commit/push."
            exit 0
          fi
          git commit -q -m 'chore: update repomix and AI context output [skip ci]'
          git push -q --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            ai-context:ai-context

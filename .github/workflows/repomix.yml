name: Repomix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行

permissions:
  contents: write # ai-context ブランチへのプッシュに必要

concurrency:
  group: repomix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-repo:
    name: Pack repository with Repomix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Pack repository with Repomix
        uses: yamadashy/repomix/.github/actions/repomix@a7b93adfcdb11be923a9a092cceb1cb6739ef8e1 # v1.14.1
        with:
          output: repomix-output.xml
          style: xml

      - name: Upload Repomix output
        uses: actions/upload-artifact@v4
        with:
          name: repomix-output
          path: repomix-output.xml

      - name: Prepare ai-context directory
        run: |
          mkdir -p public-context
          cp repomix-output.xml public-context/

      - name: Deploy to ai-context branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475c00e11fe70ba3 # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-context
          publish_branch: ai-context
          force_orphan: true
          commit_message: "chore: update repomix output [skip ci]"

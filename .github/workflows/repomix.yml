name: Repomix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行

permissions:
  contents: read

concurrency:
  group: repomix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-repo:
    name: Pack repository with Repomix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Pack repository with Repomix
        uses: yamadashy/repomix/.github/actions/repomix@a7b93adfcdb11be923a9a092cceb1cb6739ef8e1 # v1.14.1
        with:
          output: repomix-output.xml
          style: xml

      - name: Upload Repomix output
        uses: actions/upload-artifact@v4
        with:
          name: repomix-output
          path: repomix-output.xml

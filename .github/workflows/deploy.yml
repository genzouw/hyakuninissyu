name: Deploy to S3 and Invalidate CloudFront

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: genzouw-static-content
  S3_PREFIX: hyakunin
  CLOUDFRONT_DISTRIBUTION_ID: E6OM0XCJX1HGU

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun Environment
        uses: ./.github/actions/setup-bun-env

      - name: Build
        env:
          GA_ID: ${{ vars.GA_ID }}
          NODE_OPTIONS: --openssl-legacy-provider
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  deploy:
    needs: build
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # IndexNow のキーファイルをデプロイ時に動的生成する。
      # 公開リポジトリでキーファイルを直接コミットすると場所が露見するため、Secrets から生成する。
      - name: Generate IndexNow key file
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY}" ]; then
            echo "INDEXNOW_KEY secret is not set" >&2
            exit 1
          fi
          printf '%s' "${INDEXNOW_KEY}" > "dist/${INDEXNOW_KEY}.txt"

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/${S3_PREFIX}/" \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt"

          # HTML, JSON, and TXT (llms.txt, etc.) files with shorter cache
          aws s3 sync dist/ "s3://${S3_BUCKET}/${S3_PREFIX}/" \
            --delete \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/${S3_PREFIX}/*"

  indexnow:
    needs: deploy
    permissions: {}
    runs-on: ubuntu-latest
    env:
      SITEMAP_URL: 'https://hyakuninissyu.genzouw.com/sitemap.xml'
      INDEXNOW_HOST: 'hyakuninissyu.genzouw.com'
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
    steps:
      # bojieyang/indexnow-action はリポジトリの Actions allow list 外のため、
      # IndexNow API への直接呼び出しに置換している。
      - name: Submit URLs to IndexNow API
        run: |
          set -euo pipefail
          if [ -z "${INDEXNOW_KEY}" ]; then
            echo "INDEXNOW_KEY secret is not set" >&2
            exit 1
          fi

          # sitemap.xml を取得し <loc> 要素から URL リストを抽出
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 5 --max-time 30 \
            "${SITEMAP_URL}" -o /tmp/sitemap.xml
          grep -oE '<loc>[^<]+</loc>' /tmp/sitemap.xml \
            | sed -E 's|<loc>([^<]+)</loc>|\1|' > /tmp/urls.txt

          if [ ! -s /tmp/urls.txt ]; then
            echo "No URLs found in sitemap: ${SITEMAP_URL}" >&2
            exit 1
          fi

          # IndexNow API へ JSON ペイロードで送信 (1 リクエストあたり最大 10000 URL)
          jq -Rn \
            --arg host "${INDEXNOW_HOST}" \
            --arg key "${INDEXNOW_KEY}" \
            --arg keyLocation "https://${INDEXNOW_HOST}/${INDEXNOW_KEY}.txt" \
            --rawfile urls /tmp/urls.txt \
            '{
               host: $host,
               key: $key,
               keyLocation: $keyLocation,
               urlList: ($urls | split("\n") | map(select(length > 0)))
             }' > /tmp/payload.json

          curl --fail --silent --show-error \
            --retry 3 --retry-delay 5 --max-time 30 \
            -X POST 'https://api.indexnow.org/IndexNow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data-binary @/tmp/payload.json

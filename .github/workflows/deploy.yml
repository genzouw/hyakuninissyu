name: Deploy to S3 and Invalidate CloudFront

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: genzouw-static-content
  S3_PREFIX: hyakunin
  CLOUDFRONT_DISTRIBUTION_ID: E6OM0XCJX1HGU

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build
        env:
          GA_ID: ${{ vars.GA_ID }}
          NODE_OPTIONS: --openssl-legacy-provider
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  deploy:
    needs: build
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # IndexNow のキーファイルをデプロイ時に動的生成する。
      # 公開リポジトリでキーファイルを直接コミットすると場所が露見するため、Secrets から生成する。
      - name: Generate IndexNow key file
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY}" ]; then
            echo "INDEXNOW_KEY secret is not set" >&2
            exit 1
          fi
          printf '%s' "${INDEXNOW_KEY}" > "dist/${INDEXNOW_KEY}.txt"

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/${S3_PREFIX}/" \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt"

          # HTML, JSON, and TXT (llms.txt, etc.) files with shorter cache
          aws s3 sync dist/ "s3://${S3_BUCKET}/${S3_PREFIX}/" \
            --delete \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/${S3_PREFIX}/*"

  indexnow:
    needs: deploy
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: IndexNow
        uses: bojieyang/indexnow-action@v3
        with:
          sitemap-location: 'https://hyakuninissyu.genzouw.com/sitemap.xml'
          key: ${{ secrets.INDEXNOW_KEY }}

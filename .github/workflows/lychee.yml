name: Lychee Link Checker

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  link-checker:
    name: Lychee Link Checker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install lychee
        env:
          LYCHEE_VERSION: lychee-v0.24.2
          LYCHEE_ASSET: lychee-x86_64-unknown-linux-gnu.tar.gz
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          curl -sSfLo "${workdir}/${LYCHEE_ASSET}" "https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_VERSION}/${LYCHEE_ASSET}"
          curl -sSfLo "${workdir}/${LYCHEE_ASSET}.sha256" "https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_VERSION}/${LYCHEE_ASSET}.sha256"
          (cd "${workdir}" && sha256sum -c "${LYCHEE_ASSET}.sha256")
          # tarball には README.md や docs/*.md も同梱されており、リポジトリ直下に展開すると
          # lychee 自身のドキュメント（存在しない assets/yes.svg 等へのリンクを含む）が
          # リンクチェック対象に混入してしまうため、リポジトリ外の一時ディレクトリに展開する。
          tar -xzf "${workdir}/${LYCHEE_ASSET}" --strip-components=1 -C "${workdir}"
          sudo mv "${workdir}/lychee" /usr/local/bin/lychee
          rm -rf "${workdir}"

      - name: Run Lychee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lychee --verbose --no-progress \
            --exclude-path 'node_modules' \
            --exclude-path 'dist' \
            --exclude 'https://hyakuninissyu\.genzouw\.com/hyakunin_issyu\.png' \
            './**/*.md' './**/*.html' './**/*.vue'

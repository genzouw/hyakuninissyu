name: actionlint

on:
  push:
    branches: ['**']
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'
  pull_request:
    branches: ['**']
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # PR 実行時の github-pr-review レポーター用
      checks: write # push 実行時の github-check レポーター用
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Download actionlint
        id: actionlint
        run: |
          set -euo pipefail
          VERSION=1.7.7
          TARBALL="actionlint_${VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${TARBALL}"
          curl -fsSL -o /tmp/checksums.txt "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_checksums.txt"
          cd /tmp && grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp actionlint
          echo "executable=/tmp/actionlint" >> "$GITHUB_OUTPUT"

      - name: Setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.20.2

      - name: Run actionlint with Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_ACTIONLINT_OUTPUTS_EXECUTABLE: ${{ steps.actionlint.outputs.executable }}
          # github-pr-review は PR コンテキスト専用のため、PR 以外（push）では
          # コミットへ Check Run を作成する github-check に切り替える
          REPORTER: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
        run: |
          "${STEPS_ACTIONLINT_OUTPUTS_EXECUTABLE}" -oneline | reviewdog -efm="%f:%l:%c: %m" -name="actionlint" -reporter="${REPORTER}"

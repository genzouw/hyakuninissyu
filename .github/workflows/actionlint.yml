name: actionlint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Download actionlint
        id: actionlint
        run: |
          set -euo pipefail
          VERSION=1.7.7
          TARBALL="actionlint_${VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${TARBALL}"
          curl -fsSL -o /tmp/checksums.txt "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_checksums.txt"
          cd /tmp && grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp actionlint
          echo "executable=/tmp/actionlint" >> "$GITHUB_OUTPUT"

      - name: Setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.20.2

      - name: Run actionlint with Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_ACTIONLINT_OUTPUTS_EXECUTABLE: ${{ steps.actionlint.outputs.executable }}
        run: |
          "${STEPS_ACTIONLINT_OUTPUTS_EXECUTABLE}" -oneline | reviewdog -efm="%f:%l:%c: %m" -name="actionlint" -reporter=github-pr-review

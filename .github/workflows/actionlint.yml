name: actionlint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint*'

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download actionlint
        id: actionlint
        run: |
          set -euo pipefail
          VERSION=1.7.7
          TARBALL="actionlint_${VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${TARBALL}"
          curl -fsSL -o /tmp/checksums.txt "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_checksums.txt"
          cd /tmp && grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp actionlint
          echo "executable=/tmp/actionlint" >> "$GITHUB_OUTPUT"

      - name: Setup reviewdog
        uses: reviewdog/action-setup@3f401fc1eaff8796122d4060b0043ff3ebf0bfb0 # v1.3.0
        with:
          reviewdog_version: latest

      - name: Run actionlint with Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "${{ steps.actionlint.outputs.executable }}" -oneline | reviewdog -efm="%f:%l:%c: %m" -name="actionlint" -reporter=github-pr-review

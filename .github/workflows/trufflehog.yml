name: TruffleHog Secret Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    # 毎週火曜 05:00 JST (= 月曜 20:00 UTC) に定期実行
    - cron: '0 20 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trufflehog:
    permissions:
      contents: read
    name: Active Secret Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run TruffleHog (Verify only)
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || (github.event_name == 'push' && github.event.before || '') }}
          head: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && github.sha || '' }}
          # --only-verified: プロバイダのAPIに対して有効性を検証し、実際に利用可能なシークレットのみを検知
          # NOTE: --no-update はアクション側がデフォルトで付与するため extra_args では指定しない
          extra_args: --only-verified

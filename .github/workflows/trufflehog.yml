name: TruffleHog Secret Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    # 毎週火曜 05:00 JST (= 月曜 20:00 UTC) に定期実行
    - cron: '0 20 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trufflehog:
    name: Active Secret Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run TruffleHog (Verify only)
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || (github.event_name == 'push' && github.event.before || '') }}
          head: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && github.sha || '' }}
          # --only-verified: プロバイダのAPIに対して有効性を検証し、実際に利用可能なシークレットのみを検知
          # NOTE: --no-update はアクション側がデフォルトで付与するため extra_args では指定しない
          extra_args: --only-verified

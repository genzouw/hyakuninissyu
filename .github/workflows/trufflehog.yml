name: TruffleHog Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎週火曜 05:00 JST (= 月曜 20:00 UTC) に定期実行
    - cron: '0 20 * * 1'
  workflow_dispatch:

concurrency:
  group: trufflehog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trufflehog:
    name: Active Secret Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run TruffleHog (Verify only)
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || (github.event_name == 'push' && github.event.before || '') }}
          head: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && github.sha || '' }}
          # --only-verified: プロバイダのAPIに対して有効性を検証し、実際に利用可能なシークレットのみを検知
          # --no-update: スキャン時のルール更新をスキップ（CI高速化）
          extra_args: --only-verified --no-update

name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # オプションで深刻度の閾値を設定可能 (low, medium, high, critical)
          fail-on-severity: high

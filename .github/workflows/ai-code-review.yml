name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# 最小権限とし、ジョブ側で必要な書込権限のみ追加する
permissions:
  contents: read

# 同一 PR への更新で重複起動するのを抑止し、ノイズとコストを削減
concurrency:
  group: ai-code-review-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ai_code_review:
    name: Auto PR Review by AI
    runs-on: ubuntu-latest
    if: >
      github.event.sender.type != 'Bot' &&
      (github.event.sender.association == 'OWNER' ||
       github.event.sender.association == 'MEMBER' ||
       github.event.sender.association == 'COLLABORATOR')
    # PR コメント投稿に必要な権限のみ付与
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: AI Code Review アクションの実行
        uses: zxcloli666/AI-Code-Review@e4c07fe82e4c70a3cf152773423f608a88e9497d # v1.3.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE_URL: ${{ secrets.OPENAI_API_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai/' }}
          OPENAI_API_MODEL: 'gemini-2.5-pro'
          REVIEW_LANGUAGE: 'ja'
          ENABLE_LINTERS: 'true'
          ENABLE_AST: 'true'
          ENABLE_DEPENDENCY_ANALYSIS: 'true'

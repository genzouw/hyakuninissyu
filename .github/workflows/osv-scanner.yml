name: OSV-Scanner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '15 21 * * 0' # 毎週月曜 06:00 JST (= 日曜 21:00 UTC)

permissions:
  contents: read

# 同一ブランチ / PR で OSV-Scanner が重複起動するのを抑止し、無駄な実行を削減
concurrency:
  group: osv-scanner-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # ランナーに認証情報を残さないようにし、credential 漏えい面を縮小
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          # 明示的な依存関係に対する脆弱性のみを報告します
          # プロジェクトのニーズに合わせて調整可能です
          results-file-name: osv-scanner-results.sarif
        continue-on-error: true # 最初に脆弱性が見つかった場合でも、他のチェックをパスさせます

      - name: SARIF ファイルのアップロード
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        if: always() && hashFiles('osv-scanner-results.sarif') != ''
        with:
          sarif_file: osv-scanner-results.sarif
          category: osv-scanner

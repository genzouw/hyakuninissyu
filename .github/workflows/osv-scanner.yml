name: OSV-Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行
  # 設定変更（Terraform 側 allowlist 更新等）後に startup_failure が解消したか
  # 即時検証するため、および schedule を待たずに任意タイミングでスキャンを走らせる
  # ため、手動トリガーを許可する。
  workflow_dispatch:

# reusable workflow（osv-scanner-reusable.yml）は内部で
# `actions: read` / `security-events: write` を要求する。
# トップレベルの permissions が `contents: read` のみだと、ジョブレベルで
# `actions: read` / `security-events: write` を宣言してもワークフローレベルの
# 上限により無効化され、起動時に startup_failure となるため、
# 必要な権限をトップレベルで明示する。
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv-scanner:
    # `google/osv-scanner-action` は composite/docker action ではなく
    # reusable workflow として提供されているため、`jobs.<job>.uses` 経由で呼び出す。
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@19ec1116569a47416e11a45848722b1af31a857b # v1.9.0
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --recursive
        ./

name: OSV-Scanner

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
  schedule:
    - cron: '15 21 * * 0' # 毎週月曜 06:00 JST (= 日曜 21:00 UTC)

permissions:
  contents: read

# 同一ブランチ / PR で OSV-Scanner が重複起動するのを抑止し、無駄な実行を削減
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # ランナーに認証情報を残さないようにし、credential 漏えい面を縮小
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          # 明示的な依存関係に対する脆弱性のみを報告します
          # プロジェクトのニーズに合わせて調整可能です
          results-file-name: osv-scanner-results.sarif
        continue-on-error: true # 最初に脆弱性が見つかった場合でも、他のチェックをパスさせます

      - name: SARIF ファイルのアップロード
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always() && hashFiles('osv-scanner-results.sarif') != ''
        with:
          sarif_file: osv-scanner-results.sarif
          category: osv-scanner

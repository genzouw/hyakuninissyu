# Aider configuration
# https://aider.chat/docs/config/aider_conf.html

# Always use Japanese for communications and commit messages
message: "常に日本語で返答し、ソースコードのコメントやコミットメッセージ、ドキュメントも日本語で記述してください。"

# Enforce conventional commits
commit: true
commit-prompt: "Conventional Commits の形式に従い、日本語でコミットメッセージを作成してください（例: feat: 新機能の追加, fix: バグの修正）。"

# Additional configurations to match project requirements
dark-mode: true
yes: true # Auto-answer yes to routine prompts

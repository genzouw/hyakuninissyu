---
# Codacy 解析設定 — 偽陽性 warning を抑制して品質ゲートを正しく運用する
#
# Codacy が ESLint v9 Flat Config (eslint.config.js) を読まないため、
# 本プロジェクトのコーディング規約 (ES Modules 限定 / neostandard 準拠) と
# 整合しない偽陽性が出続け、品質ゲートが ACTION_REQUIRED から抜けられない
# 問題が発生する。本ファイルでその偽陽性を抑制する。
#
# 抑制内容:
# 1. テストコード全体 (`test/**`)
#    ESLint Flat Config 非対応起因の import/globals 誤検知
#    (`@jest/globals` 由来) を回避するため除外する。
# 2. Vue Single File Component 全体 (`**/*.vue`)
#    Codacy 内蔵の JSHint が <script> ブロックを ES5 モードで解析し、
#    `import` / property shorthand 等の ES2015 構文を一律
#    "ES2015 ... are forbidden" と警告する。Vue ファイルの JavaScript
#    部分は CI の ESLint ジョブ (eslint-plugin-vue を含む Flat Config)
#    で検証済みのため、Codacy 側で重複解析する必要はない。
# 3. `src/constants/url.js`
#    公開 Twitter シェア URL の percent-encoded クエリ文字列を
#    "Potential secret found" と誤検知するため除外する。
#    当該ファイルは単一の文字列定数のみで品質劣化リスクなし。
# 4. `AGENTS.md` / `docs/agents/jules-prompt.md`
#    Codacy の AI ドキュメント解析が以下の偽陽性 / 設計意図に反する
#    指摘を出し、品質ゲートを ACTION_REQUIRED から抜けられなくする
#    ため除外する:
#    - "Absolute rule without escape hatch":
#      本ドキュメントは RFC 2119 に基づき MUST / MUST NOT で絶対ルールを
#      規定する規範文書であり、escape hatch を入れることは設計意図に反する。
#    - "Undefined acronym (MUST 等)":
#      文書冒頭で RFC 2119 を明示参照しているため定義済みだが、
#      Codacy が参照リンクを評価しない。OSS / OIDC / SHA / SAST / OSV / GA /
#      TTS 等は業界一般用語で、用語集を都度添える設計ではない。
#    - "Referenced file CONTRIBUTING.md not found":
#      リポジトリルートに `CONTRIBUTING.md` が実在するが Codacy が誤検知。
#    - "Mixed-language lines":
#      本リポジトリのドキュメントは日本語ベース + 技術用語英語が規約。
# 5. `eslint.config.js`
#    ESLint Flat Config は CommonJS (require/const/spread) が必須のファイルで
#    あり、Codacy 既定の ES5 前提パターン (es-x / @typescript-eslint の
#    no-var-requires / Biome の noUndeclaredDependencies) が誤検知を出すため
#    除外する。このファイル自体はリポジトリの ESLint 設定 (ignores: '*.js')
#    でも解析対象外。
exclude_paths:
  - 'test/**'
  - '**/*.vue'
  - 'src/constants/url.js'
  - 'AGENTS.md'
  - 'docs/agents/jules-prompt.md'
  - 'eslint.config.js'

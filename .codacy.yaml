---
# Codacy 解析設定 — 偽陽性 warning を抑制して品質ゲートを正しく運用する
#
# Codacy が ESLint v9 Flat Config (eslint.config.js) を読まないため、
# 本プロジェクトのコーディング規約 (ES Modules 限定 / neostandard 準拠) と
# 整合しない偽陽性が出続け、品質ゲートが ACTION_REQUIRED から抜けられない
# 問題が発生する。本ファイルでその偽陽性を抑制する。
#
# 抑制内容:
# 1. テストコード全体: ESLint Flat Config 非対応起因の import/globals 誤検知
#    (`@jest/globals` 由来) を回避するため `test/**` を除外する。
# 2. JSHint ツール: ES5 モードで動作し、本プロジェクトが全面採用している
#    ES2015+ 構文 (import/export, const, property shorthand) を一律
#    "forbidden" と警告する。同等以上の検査は ESLint (CI: ESLint job) で
#    実施済みのため、JSHint は無効化する。
# 3. `src/constants/url.js`: 公開 Twitter シェア URL の percent-encoded
#    クエリ文字列を "Potential secret found" と誤検知するため、当該
#    ファイルのみ解析対象から除外する (内容は単一の文字列定数のみ)。
exclude_paths:
  - 'test/**'
  - 'src/constants/url.js'
engines:
  jshint:
    enabled: false

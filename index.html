  <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <a class="navbar-brand" href="/">ひゃくにんいっしゅをおぼえよう</a>

      <a class="twitter-share-button" href="https://twitter.com/intent/tweet" data-size="large" data-text="ひゃくにんいっしゅをおぼえよう" data-url="">シェア</a>
    </nav>

    <div class="container-fluid">
      <div class="row justify-content-center" id="app" style="display: none;">
        <div class="col-sm-10 p-1 quiz-start-page" v-if="currentQuestionIndex === -1">
          <h1>ひゃくにんいっしゅをおぼえよう</h1>
          <p class="intro">もんだいのかずは <input type="number" v-model="totalQuestions" style="width: 3em; text-align: right;" max="40" /> もんだよ</p>
          <button class="btn btn-lg btn-primary start" @click.prevent="clickStart">スタート</button>
          <img src="karuta_hyakunin_issyu.png" class="img-fluid" alt="">
        </div>

        <div class="col-sm-10 p-2 cont main-container bg-secondary text-dark" v-else-if="currentQuestionIndex < totalQuestions">
          <div class="question">[だい{{ currentQuestionIndex + 1 }}もん]<p v-html="questionData.question"></p></div>
          <div class="row">
            <div class="col-sm-12" v-for="(c, i) in questionData.choices">
              <label class="option" v-bind:class="{ correct: !thinking && c === questionData.answer,  choiced: !thinking && c === choice }">
                <input type="radio" v-model="choice" v-bind:value="c" v-bind:disabled="!thinking" @change.prevent="clickAnswer"/>
                <span>({{ i+1 }}) {{ c }}</span>
              </label>
            </div>
          </div>
          <div class="row justify-content-center">
            <div class="col-auto">
              <!-- <button class="btn btn-lg btn-danger" v-bind:disabled="!(choice && choice.length > 0)" v-if="thinking" @click.prevent="clickAnswer">決定</button> -->
              <button class="btn btn-lg btn-primary" v-bind:disabled="thinking" @click.prevent="clickNext">次へ</button>
            </div>
          </div>
          <div class="row justify-content-center">
            <div class="col-auto">
              <img src="karuta_hyakunin_issyu.png" class="img-fluid" alt="">
            </div>
          </div>
        </div>

        <div class="col-sm-10 p-2" v-else>
          <div class="cont result bg-dark text-light"><p>すこあは</p> <p>{{ result }}</p> <p>です</p></div>
          <div class="row justify-content-center">
            <div class="col-auto">
              <p><strong>よろしければしぇあをおねがいします！</strong></p>
              <h3><a href="/">もういっかいちゃれんじ！</a></h3>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="page-footer font-small fixed-bottom bg-light text-dark justify-content-center">
      <div class="footer-copyright text-center py-3">
        <a class="twitter-share-button" href="https://twitter.com/intent/tweet" data-size="large" data-text="ひゃくにんいっしゅをおぼえよう" data-url="">しぇあ</a>
        <a href="https://twitter.com/genzouw" class="twitter-follow-button" data-size="large" data-show-count="false">@genzouw をふぉろー</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/vue"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.10.6/locale/ja.js"></script>
    <script src="question.js"></script>
    <script src="script.js"></script>

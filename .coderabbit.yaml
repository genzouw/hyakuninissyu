# CodeRabbit configuration
# https://docs.coderabbit.ai/reference/configuration

language: "ja-JP"
early_access: false
enable_free_tier: true

reviews:
  # 個人運営だが、実行環境にデプロイされる前提のため検出漏れを避けたい。
  # そのため "assertive" を採用して検出感度を高めに維持する。
  # ノイズが過剰になった場合は将来 "chill" に戻すことも検討する。
  profile: "assertive"

  # PR全体に対する指針として設定する。
  # path_instructions で "**/*" を指定するとファイルごとに繰り返し適用され
  # ノイズが増えるため、広範な指示は instructions に集約する。
  instructions: |
    変更がプロジェクト全体に与える影響や、アーキテクチャの観点など、広いスコープからコードレビューを行ってください。必ず日本語でコメントしてください。

  # CodeRabbit を bot reviewer として動作させる。
  # 問題なしと判断した PR に対して Approve ステータスを返す。
  # 個人運営での self-merge 運用 (PR 作成者は自分の PR を承認できない GitHub 仕様)
  # を補助する目的で有効化。Approve は最終判断ではなく補助。
  request_changes_workflow: true

  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "**/*"
      instructions: |
        メインブランチにマージされた場合に実行環境にデプロイされることを考慮し、以下の観点を強調し、重要視して必ずレビューに盛り込んでください：
        - 実行環境へのアクセス方法（認証情報、APIキー、内部URLなど）がコードやログから漏洩していないこと。
        - 実行環境に不正にアクセスするための攻撃手法や脆弱性（インジェクション、不適切な権限設定など）が入り込んでいないこと。

  # 生成物 / 依存物 / ロックファイルなどはレビュー対象から除外する。
  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!node_modules/**"
    - "!pnpm-lock.yaml"
    - "!package-lock.json"
    - "!yarn.lock"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/*.map"
    - "!**/*.snap"

  abort_on_close: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
